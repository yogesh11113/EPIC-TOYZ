<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Epic Toyz</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    /* ===== CART PAGE STYLES ===== */
    .cart-page {
      min-height: 100vh;
      background: var(--dark-bg, #0D0E1A);
      padding-bottom: 80px;
    }

    /* Breadcrumb */
    .breadcrumb-bar {
      background: var(--surface, #1A1E2E);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 12px 0;
    }
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-muted, #ADB5BD);
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .breadcrumb a {
      color: var(--text-muted, #ADB5BD);
      text-decoration: none;
      transition: color 0.2s;
    }
    .breadcrumb a:hover { color: var(--primary-red, #E63946); }
    .breadcrumb .sep { opacity: 0.4; }
    .breadcrumb .current { color: #fff; font-weight: 500; }

    /* Page Header */
    .cart-header {
      max-width: 1200px;
      margin: 36px auto 28px;
      padding: 0 24px;
      display: flex;
      align-items: baseline;
      gap: 14px;
    }
    .cart-header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }
    .cart-count-badge {
      background: var(--primary-red, #E63946);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 50px;
      min-width: 28px;
      text-align: center;
    }

    /* Layout */
    .cart-layout {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 28px;
      align-items: start;
    }

    /* ===== CART ITEMS ===== */
    .cart-items-section {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .cart-items-header {
      display: grid;
      grid-template-columns: 1fr 140px 120px 80px;
      padding: 12px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted, #ADB5BD);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #cart-items-container {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .cart-item {
      display: grid;
      grid-template-columns: 72px 1fr 140px 120px 80px;
      align-items: center;
      gap: 16px;
      padding: 20px 16px;
      background: var(--card-bg, #12151F);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      border-radius: 0;
      transition: background 0.2s;
      animation: fadeInUp 0.3s ease both;
    }
    .cart-item:first-child { border-radius: 12px 12px 0 0; }
    .cart-item:last-child { border-radius: 0 0 12px 12px; border-bottom: none; }
    .cart-item:only-child { border-radius: 12px; }
    .cart-item:hover { background: rgba(255,255,255,0.04); }

    .cart-item-img {
      width: 72px;
      height: 72px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--surface, #1A1E2E);
    }
    .cart-item-details h4 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      margin: 0 0 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .cart-item-details .item-category {
      font-size: 0.78rem;
      color: var(--text-muted, #ADB5BD);
      background: rgba(255,255,255,0.06);
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
    }
    .cart-item-details .item-unit-price {
      font-size: 0.8rem;
      color: var(--text-muted, #ADB5BD);
      margin-top: 4px;
    }

    /* Qty control */
    .qty-control {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface, #1A1E2E);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      overflow: hidden;
      width: fit-content;
    }
    .qty-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.1rem;
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .qty-btn:hover { background: var(--primary-red, #E63946); }
    .qty-display {
      width: 36px;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
      color: #fff;
      border-left: 1px solid rgba(255,255,255,0.1);
      border-right: 1px solid rgba(255,255,255,0.1);
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-item-price {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--text-muted, #ADB5BD);
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-remove:hover {
      background: rgba(231, 76, 60, 0.15);
      color: #e74c3c;
    }

    /* Empty Cart */
    .empty-cart {
      background: var(--card-bg, #12151F);
      border-radius: 16px;
      padding: 80px 40px;
      text-align: center;
      border: 1px dashed rgba(255,255,255,0.1);
    }
    .empty-cart-illustration {
      font-size: 80px;
      margin-bottom: 20px;
      display: block;
      animation: bounce 2s ease infinite;
    }
    .empty-cart h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin: 0 0 8px;
    }
    .empty-cart p {
      color: var(--text-muted, #ADB5BD);
      font-size: 0.95rem;
      margin: 0 0 28px;
    }

    /* ===== ORDER SUMMARY ===== */
    .order-summary {
      position: sticky;
      top: 100px;
      background: var(--card-bg, #12151F);
      border-radius: 16px;
      padding: 28px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .order-summary h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin: 0 0 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    .summary-row .label { color: var(--text-muted, #ADB5BD); }
    .summary-row .value { color: #fff; font-weight: 500; }
    .summary-row .free-shipping { color: #2ecc71; font-weight: 600; }
    .summary-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 16px 0;
    }
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .summary-total .total-label {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }
    .summary-total .total-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary-red, #E63946);
    }
    .btn-checkout {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--primary-red, #E63946), #c0392b);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }
    .btn-checkout:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(230, 57, 70, 0.4);
      color: #fff;
    }
    .btn-continue {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 24px;
    }
    .btn-continue:hover {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.05);
      color: #fff;
    }

    /* Trust badges */
    .trust-badges {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .trust-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: var(--text-muted, #ADB5BD);
    }
    .trust-badge svg { flex-shrink: 0; opacity: 0.7; }

    /* ===== SUGGESTED PRODUCTS ===== */
    .suggested-section {
      max-width: 1200px;
      margin: 48px auto 0;
      padding: 0 24px;
    }
    .suggested-section h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      margin: 0 0 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .suggested-section h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .suggested-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    .skeleton-card {
      height: 280px;
      border-radius: 12px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Promo badge on shipping */
    .shipping-promo {
      background: rgba(46, 204, 113, 0.1);
      border: 1px solid rgba(46, 204, 113, 0.2);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.8rem;
      color: #2ecc71;
      text-align: center;
      margin-bottom: 16px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }
      .order-summary { position: static; }
      .cart-items-header { display: none; }
      .cart-item {
        grid-template-columns: 64px 1fr auto;
        grid-template-rows: auto auto;
      }
      .cart-item-details { grid-column: 2; }
      .qty-control { grid-column: 2; }
      .cart-item-price { grid-column: 3; grid-row: 1; }
      .btn-remove { grid-column: 3; grid-row: 2; justify-self: end; }
      .suggested-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .cart-header h1 { font-size: 1.5rem; }
      .suggested-grid { grid-template-columns: 1fr; }
      .cart-layout { padding: 0 16px; }
    }
  </style>
</head>
<body class="cart-page">
  <div id="navbar-placeholder"></div>

  <!-- Breadcrumb -->
  <div class="breadcrumb-bar">
    <nav class="breadcrumb">
      <a href="index.html">Home</a>
      <span class="sep">›</span>
      <span class="current">Shopping Cart</span>
    </nav>
  </div>

  <!-- Page Header -->
  <div class="cart-header">
    <h1>Shopping Cart</h1>
    <span class="cart-count-badge" id="cart-header-count">0 items</span>
  </div>

  <!-- Main Cart Layout -->
  <div class="cart-layout">
    <!-- Left: Cart Items -->
    <div class="cart-items-section">
      <div class="cart-items-header">
        <span style="grid-column: span 2;">Product</span>
        <span>Quantity</span>
        <span>Total</span>
        <span></span>
      </div>
      <div id="cart-items-container">
        <!-- Items rendered by cart.js -->
        <div class="skeleton skeleton-card" style="height:100px; margin-bottom:8px;"></div>
        <div class="skeleton skeleton-card" style="height:100px; margin-bottom:8px;"></div>
        <div class="skeleton skeleton-card" style="height:100px;"></div>
      </div>
    </div>

    <!-- Right: Order Summary -->
    <aside class="order-summary" id="order-summary">
      <h3>Order Summary</h3>
      <div id="summary-content">
        <div class="skeleton" style="height:18px; margin-bottom:12px;"></div>
        <div class="skeleton" style="height:18px; margin-bottom:12px; width:70%;"></div>
        <div class="skeleton" style="height:18px; margin-bottom:20px;"></div>
        <div class="skeleton" style="height:48px; border-radius:10px;"></div>
      </div>
    </aside>
  </div>

  <!-- Suggested Products -->
  <section class="suggested-section">
    <h2>You May Also Like</h2>
    <div class="suggested-grid" id="suggested-products">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
